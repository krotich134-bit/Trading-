name: AI Trading System CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: ai-trading-production

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_trading_system
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
    
    - name: Lint with flake8
      run: |
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Type check with mypy
      run: |
        mypy src --ignore-missing-imports
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ai_trading_system
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Bandit security scan
      run: |
        pip install bandit
        bandit -r src/ -f json -o bandit-report.json || true
    
    - name: Run safety check
      run: |
        pip install safety
        safety check -r requirements.txt
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-results
        path: bandit-report.json

  build:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Build and push Signal Engine
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/ai-trading/signal-engine:$IMAGE_TAG -f docker/signal-engine/Dockerfile .
        docker push $ECR_REGISTRY/ai-trading/signal-engine:$IMAGE_TAG
        docker tag $ECR_REGISTRY/ai-trading/signal-engine:$IMAGE_TAG $ECR_REGISTRY/ai-trading/signal-engine:latest
        docker push $ECR_REGISTRY/ai-trading/signal-engine:latest
    
    - name: Build and push Risk Engine
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/ai-trading/risk-engine:$IMAGE_TAG -f docker/risk-engine/Dockerfile .
        docker push $ECR_REGISTRY/ai-trading/risk-engine:$IMAGE_TAG
        docker tag $ECR_REGISTRY/ai-trading/risk-engine:$IMAGE_TAG $ECR_REGISTRY/ai-trading/risk-engine:latest
        docker push $ECR_REGISTRY/ai-trading/risk-engine:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ai-trading-staging --region $AWS_REGION
    
    - name: Deploy to Staging
      run: |
        kubectl set image deployment/signal-engine signal-engine=$ECR_REGISTRY/ai-trading/signal-engine:${{ github.sha }} -n ai-trading
        kubectl set image deployment/risk-engine risk-engine=$ECR_REGISTRY/ai-trading/risk-engine:${{ github.sha }} -n ai-trading
        kubectl rollout status deployment/signal-engine -n ai-trading --timeout=300s
        kubectl rollout status deployment/risk-engine -n ai-trading --timeout=300s
    
    - name: Run smoke tests
      run: |
        kubectl run smoke-test --rm -i --restart=Never --image=curlimages/curl -- curl -f http://signal-engine.ai-trading.svc.cluster.local:8080/health

  integration-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    defaults:
      run:
        working-directory: ai_trading_system
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ai-trading-staging --region $AWS_REGION
    
    - name: Run integration tests
      run: |
        pip install -r requirements-test.txt
        pytest tests/integration/ -v --tb=short

  deploy-production:
    runs-on: ubuntu-latest
    needs: integration-tests
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION
    
    - name: Deploy to Production (Canary)
      run: |
        # Deploy canary (10% of traffic)
        kubectl apply -f k8s/canary/signal-engine-canary.yaml
        kubectl apply -f k8s/canary/risk-engine-canary.yaml
        sleep 60
        
        # Check canary health
        kubectl run canary-check --rm -i --restart=Never --image=curlimages/curl -- curl -f http://signal-engine-canary.ai-trading.svc.cluster.local:8080/health
    
    - name: Promote to Production
      if: success()
      run: |
        kubectl set image deployment/signal-engine signal-engine=$ECR_REGISTRY/ai-trading/signal-engine:${{ github.sha }} -n ai-trading
        kubectl set image deployment/risk-engine risk-engine=$ECR_REGISTRY/ai-trading/risk-engine:${{ github.sha }} -n ai-trading
        kubectl rollout status deployment/signal-engine -n ai-trading --timeout=600s
        kubectl rollout status deployment/risk-engine -n ai-trading --timeout=600s
    
    - name: Rollback on failure
      if: failure()
      run: |
        kubectl rollout undo deployment/signal-engine -n ai-trading
        kubectl rollout undo deployment/risk-engine -n ai-trading
    
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#trading-alerts'
        text: 'Production deployment ${{ job.status }}'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      if: always()

  terraform-apply:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.6.0"
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Terraform Init
      run: |
        cd infrastructure/terraform
        terraform init
    
    - name: Terraform Plan
      run: |
        cd infrastructure/terraform
        terraform plan -out=tfplan
    
    - name: Terraform Apply
      run: |
        cd infrastructure/terraform
        terraform apply -auto-approve tfplan
